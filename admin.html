<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运营后台</title>
<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<style>
body{max-width:700px;margin:30px auto;padding:0 20px;font-family:Arial}
.form-item{margin:18px 0}
label{display:block;margin-bottom:6px;font-weight:600}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
textarea{height:120px}
button{background:#007bff;color:#fff;border:none;padding:12px 24px;border-radius:6px;cursor:pointer}
.tip{color:#666;margin-top:10px;font-size:13px}
</style>
</head>
<body>
<div id="app">
  <h2>运营管理后台</h2>

  <div class="form-item">
    <label>网站标题</label>
    <input v-model="form.title">
  </div>
  <div class="form-item">
    <label>网站描述</label>
    <textarea v-model="form.description"></textarea>
  </div>
  <div class="form-item">
    <label>公告内容</label>
    <textarea v-model="form.notice"></textarea>
  </div>

  <button @click="save">跳转修改</button>
  <div class="tip">{{tip}}</div>
</div>

<script>
new Vue({
  el: '#app',
  data: {
    form: {},
    tip: '跳转后，粘贴到编辑框，点击顶部绿色按钮即可发布'
  },
  mounted() {
    fetch('./data.json')
      .then(res => res.json())
      .then(data => this.form = data)
  },
  methods: {
    save() {
      // ========== 这是你的仓库地址，我已经帮你填好了！ ==========
      const user = "987625922"
      const repo = "987625922.github.io"
      
      // 把表单转成 JSON
      const jsonContent = JSON.stringify(this.form, null, 2)
      
      // 跳转到 GitHub 编辑页（官方标准方式，100%可用）
      const url = `https://github.com/${user}/${repo}/edit/main/data.json`
      window.open(url, '_blank')
      
      this.tip = "✅ 已打开编辑页面，请修改后提交！"
    }
  }
})
</script>
</body>
</html>
