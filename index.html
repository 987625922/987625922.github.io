<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>用户展示页</title>
  <style>
    body{max-width: 800px;margin: 30px auto;padding: 0 20px;line-height: 1.6;font-size: 16px;}
    .box{padding: 20px;border: 1px solid #eee;border-radius: 10px;margin-top:20px}
  </style>
</head>
<body>
  <h1 id="title">加载中...</h1>
  <div class="box">
    <p><strong>描述：</strong><span id="desc"></span></p>
    <p><strong>联系电话：</strong><span id="contact"></span></p>
    <p><strong>公告：</strong><span id="notice"></span></p>
  </div>

  <script>
    fetch('./data.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('title').innerText = data.title
        document.getElementById('desc').innerText = data.description
        document.getElementById('contact').innerText = data.contact
        document.getElementById('notice').innerText = data.notice
      })
  </script>
</body>
</html>
